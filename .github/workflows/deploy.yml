name: Deploy Cloudflare

on:
  push:
    branches:
      - main

concurrency:
  group: skillset-ai-production
  cancel-in-progress: true

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SKILLSET_API_BASE_URL: ${{ secrets.SKILLSET_API_BASE_URL }}
      SKILLSET_WEB_BASE_URL: ${{ secrets.SKILLSET_WEB_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Deploy API worker
        run: >
          npx wrangler deploy
          --keep-vars
          --var APP_BASE_URL:${SKILLSET_API_BASE_URL}
          --var FRONTEND_ORIGIN:${SKILLSET_WEB_BASE_URL}

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-api
    defaults:
      run:
        working-directory: apps/web
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SKILLSET_API_BASE_URL: ${{ secrets.SKILLSET_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build OpenNext bundle
        run: npm run build:cloudflare

      - name: Deploy frontend worker
        run: >
          npx wrangler deploy
          --keep-vars
          --var SKILLSET_API_BASE_URL:${SKILLSET_API_BASE_URL}
